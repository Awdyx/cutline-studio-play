<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var STORAGE_KEY = 'cutline-theme-v1'
        var CANVAS_BG = { light: '#f3f3f3', dark: '#161616' }
        var mode = 'light'
        try {
          var raw = localStorage.getItem(STORAGE_KEY)
          if (raw) {
            var data = JSON.parse(raw)
            var state = data.state || data
            if (state.mode) mode = state.mode
          }
        } catch (_) {}
        var effective =
          mode === 'auto'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : mode
        if (effective !== 'light' && effective !== 'dark') effective = 'light'
        var bg = CANVAS_BG[effective]
        var root = document.documentElement
        root.dataset.theme = effective
        root.style.colorScheme = effective
        root.style.setProperty('--canvas-bg', bg)
        root.style.backgroundColor = bg
        document.body.style.backgroundColor = bg
        var tc = document.querySelector('meta[name="theme-color"]')
        if (tc) tc.setAttribute('content', bg)

        var phone =
          window.matchMedia('(max-width: 639px)').matches &&
          window.matchMedia('(pointer: coarse)').matches
        if (!phone) {
          var refW = 1440
          var refH = 900
          var minScale = 0.82
          var scale = Math.min(
            window.innerWidth / refW,
            window.innerHeight / refH,
            1,
          )
          scale = Math.max(minScale, scale)
          root.style.setProperty('--chrome-ui-scale', String(scale))
        }
      })()
    </script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        min-height: 100%;
        min-height: 100dvh;
        min-height: 100lvh;
        min-height: -webkit-fill-available;
        background-color: #f3f3f3;
      }
      html[data-theme='dark'],
      html[data-theme='dark'] body,
      html[data-theme='dark'] #root {
        background-color: #161616;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f3f3f3" />
    <title>cutline-studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
